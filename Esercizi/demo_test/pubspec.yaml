name: demo_test
description: "Demo completa Flutter con best practices: testing, flavors, code quality."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Environment Variables
  flutter_dotenv: ^5.1.0
  
  # Network & API
  http: ^1.2.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Performance
  cached_network_image: ^3.3.1
  
  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting & Analysis
  flutter_lints: ^6.0.0
  
  # Testing
  mockito: ^5.4.4
  build_runner: ^2.4.8
  
  # Integration Testing
  integration_test:
    sdk: flutter
  
  # Flavor Management
  flutter_flavorizr: ^2.2.3
  
  # Code Generation
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - .env.dev
    - .env.stage
    - .env.prod
    - assets/images/
